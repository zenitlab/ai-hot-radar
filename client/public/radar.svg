<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Solid coral tile — matches the Anthropic-inspired warm palette
       used throughout the app's light mode (--accent-blue: #cc785c) -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#cc785c"/>

  <!-- Radar signal — three concentric arcs sweeping from bottom-left,
       cream stroke matches the canvas tone (#faf6ec). Reads as both
       "radar" and "signal" at 16×16. -->
  <g fill="none" stroke="#faf6ec" stroke-linecap="round">
    <path d="M 22 42 Q 22 32 32 32" stroke-width="3" opacity="0.5"/>
    <path d="M 20 48 Q 20 26 42 26" stroke-width="3" opacity="0.72"/>
    <path d="M 18 54 Q 18 20 52 20" stroke-width="3" opacity="0.95"/>
  </g>

  <!-- Origin dot — the "you are here" point of the sweep -->
  <circle cx="18" cy="54" r="3.6" fill="#faf6ec"/>
</svg>
