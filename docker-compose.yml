version: '3.8'

services:
  client:
    build: ./client-next
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://server:3001
      - NODE_ENV=production
    depends_on:
      - server
    restart: unless-stopped

  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/data:/app/data
    environment:
      - DATABASE_URL=file:./data/dev.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - MODEL_NAME=${MODEL_NAME:-qwen-coder-turbo}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped
